{% load static %}
<header class="erp-header">
    <div class="erp-header__left">
        <!-- Botão hambúrguer (mobile) -->
        <button onclick="toggleSidebar()" class="erp-mobile-menu-btn" title="Abrir menu">☰</button>
        <a href="{% url 'ERP_ServicesBI:dashboard' %}" class="erp-header__logo">
            <span>ERP_ServicesBI</span>
        </a>
    </div>
    
    <div class="erp-header__controls">
        <!-- Botão Dark/Light Mode -->
        <button class="erp-theme-btn" 
                onclick="toggleTheme()" 
                title="Alternar tema (dark/light)"
                id="themeToggleBtn">
            <span id="themeIcon">🌙</span>
        </button>
        
        <!-- User Info -->
        <div class="erp-user-info">
            <span>{{ request.user.first_name|default:request.user.username }}</span>
            <span>|</span>
            <a href="{% url 'ERP_ServicesBI:logout' %}">Sair</a>
        </div>
    </div>
</header>
